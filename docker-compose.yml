services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: lookator
      POSTGRES_USER: lookator
      POSTGRES_PASSWORD: lookator
    ports:
      - "5432:5432"
    volumes:
      - lookator_postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lookator -d lookator"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lookator
      SPRING_DATASOURCE_USERNAME: lookator
      SPRING_DATASOURCE_PASSWORD: lookator
      LOOKATOR_JWT_SECRET: change-this-dev-secret-before-sharing
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: ""
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  lookator_postgres:
